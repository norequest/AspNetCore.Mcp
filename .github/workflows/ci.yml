name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          # All three SDKs so dotnet test exercises the net8/net9/net10 TFM legs and
          # the generator is verified to load under the .NET 8 SDK's Roslyn 4.8 host.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - run: dotnet restore McpIt.slnx
      - run: dotnet build McpIt.slnx -c Release --no-restore
      - run: dotnet test McpIt.slnx -c Release --no-build --verbosity normal

  publish:
    # Runs only when you push a version tag like v1.0.0, and only after tests pass.
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          V=${{ steps.ver.outputs.version }}
          dotnet pack src/McpIt.Abstractions     -c Release -o artifacts -p:Version=$V
          dotnet pack src/McpIt                   -c Release -o artifacts -p:Version=$V
          dotnet pack src/McpIt.TokenReport.Tool -c Release -o artifacts -p:Version=$V

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        # NOTE: intentionally NO --skip-duplicate. That flag turns a 409 Conflict
        # ("version already exists" / failed-validation / stuck-validating) into a
        # green build, which once hid a real publish failure. Let conflicts fail loud.
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
